[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

# /proxy?url=... (query-param) → edge function — streams binary, no size limit (for HLS .m3u8)
[[edge_functions]]
  path = "/proxy"
  function = "proxy"

# /proxy/https:/... (path-based) → regular function — used by Shaka for DASH/MPD
[[redirects]]
  from   = "/proxy/*"
  to     = "/.netlify/functions/proxy"
  status = 200
  force  = true

[[redirects]]
  from   = "/fetch-playlist"
  to     = "/.netlify/functions/fetch-playlist"
  status = 200
  force  = true

[[redirects]]
  from   = "/license-proxy"
  to     = "/.netlify/functions/license-proxy"
  status = 200
  force  = true

[[redirects]]
  from   = "/stalker-resolve"
  to     = "/.netlify/functions/stalker-resolve"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
